<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Clock Screen</title>
  </head>
  <body>
    <script>
      (function (w) {
        try {
          w.console.log('[MoneyClock] shell', w.location.href);
          var h = w.history;
          if (h && typeof h.pushState === 'function') {
            var _push = h.pushState.bind(h);
            var _replace = h.replaceState.bind(h);
            h.pushState = function (state, title, url) {
              var before = w.location.href;
              _push(state, title, url);
              w.console.log('[MoneyClock] history.pushState', {
                urlArg: typeof url === 'undefined' ? undefined : String(url),
                before: before,
                after: w.location.href
              });
              w.console.trace();
            };
            h.replaceState = function (state, title, url) {
              var before = w.location.href;
              _replace(state, title, url);
              w.console.log('[MoneyClock] history.replaceState', {
                urlArg: typeof url === 'undefined' ? undefined : String(url),
                before: before,
                after: w.location.href
              });
              w.console.trace();
            };
            w.console.log('[MoneyClock] history API patched (before modules)');
          }
        } catch (e) {
          w.console.error('[MoneyClock] shell script error', e);
        }
      })(window);
    </script>
    <script>
      try {
        var __p = (location.pathname || '').replace(/\/$/, '');
        var __m = __p.match(/^\/u\/([a-fA-F0-9]{32})$/);
        if (__m) sessionStorage.setItem('mc_magic_link_id', __m[1].toLowerCase());
      } catch (_) {}
    </script>
    <script>
      try {
        var t = localStorage.getItem('moneyclock-theme');
        if (t === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
          if (t !== 'dark') {
            localStorage.setItem('moneyclock-theme', 'dark');
          }
        }
      } catch (_) {
        document.documentElement.classList.add('dark');
      }
      try {
        var loc = localStorage.getItem('moneyclock-locale');
        var htmlLangBy = {
          en: 'en',
          ru: 'ru',
          es: 'es',
          fr: 'fr',
          de: 'de',
          zh: 'zh-Hans',
          ja: 'ja',
          pt: 'pt'
        };
        document.documentElement.lang = htmlLangBy[loc] || 'en';
      } catch (_) {
        document.documentElement.lang = 'en';
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
