<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Clock Screen</title>
  </head>
  <body>
    <script>
      try {
        var t = localStorage.getItem('moneyclock-theme');
        if (t !== 'light') document.documentElement.classList.add('dark');
      } catch (_) {
        document.documentElement.classList.add('dark');
      }
      try {
        var loc = localStorage.getItem('moneyclock-locale');
        var htmlLangBy = {
          en: 'en',
          ru: 'ru',
          es: 'es',
          fr: 'fr',
          de: 'de',
          zh: 'zh-Hans',
          ja: 'ja',
          pt: 'pt'
        };
        document.documentElement.lang = htmlLangBy[loc] || 'en';
      } catch (_) {
        document.documentElement.lang = 'en';
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
